<section id="hero" class="hero">
  <!-- Background effects -->
  <div class="hero-bg">
    <div class="glow-dot glow-1"></div>
    <div class="glow-dot glow-2"></div>
    <div class="grid-lines"></div>
  </div>

  <div class="container">
    <div class="hero-content">
      <!-- Left: Text -->
      <div class="hero-text">
        <div class="hero-tag">
          <span class="dot"></span>
          Disponible pour de nouveaux projets
        </div>

        <h1 class="hero-name">
          <span class="greeting">Bonjour, je suis</span>
          <span class="name-highlight">Jordan</span>
          <span class="name-sub">Toutsop Dongmo</span>
        </h1>

        <div class="hero-typed">
          <span class="typed-prefix">// </span>
          <span class="typed-text">{{ displayedText }}</span>
          <span class="cursor">|</span>
        </div>

        <p class="hero-description" *ngIf="profile">
          {{ profile.description }}
        </p>

        <div class="hero-stats">
          <div class="stat">
            <span class="stat-number">6+</span>
            <span class="stat-label">Années<br>d'expérience</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-number">6+</span>
            <span class="stat-label">Projets<br>livrés</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-number">10+</span>
            <span class="stat-label">Technologies<br>maîtrisées</span>
          </div>
        </div>

        <div class="hero-actions">
          <button class="btn btn-primary" (click)="scrollTo('contact')">
            <i class="fas fa-paper-plane"></i>
            Me contacter
          </button>
          <button class="btn btn-outline" (click)="scrollTo('projects')">
            <i class="fas fa-code"></i>
            Voir mes projets
          </button>
        </div>

        <div class="hero-socials">
          <a href="https://github.com/ToutsopDongmoJordan21" target="_blank" class="social-link">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/jordan-toutsop-6b2b731a1/" target="_blank" class="social-link">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="mailto:jordantoutsop472@gmail.com" class="social-link">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
      </div>

      <!-- Right: Photo card -->
      <div class="hero-visual">
        <div class="photo-frame">
          <div class="photo-border"></div>
          <div class="photo-container">
            <img src="assets/images/jordan.jpg" alt="Jordan Toutsop Dongmo" class="profile-photo"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="photo-placeholder">
              <span>JTD</span>
            </div>
          </div>
          <div class="floating-badge badge-1">
            <i class="fab fa-angular"></i> Angular
          </div>
          <div class="floating-badge badge-2">
            <i class="fab fa-node-js"></i> Node.js
          </div>
          <div class="floating-badge badge-3">
            <i class="fas fa-brain"></i> IA/ML
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator" (click)="scrollTo('about')">
    <span>Défiler</span>
    <div class="scroll-arrow">
      <i class="fas fa-chevron-down"></i>
    </div>
  </div>
</section>
