<section id="experience" class="experience">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Parcours</span>
      <h2 class="section-title">Mes <span>Expériences</span></h2>
    </div>

    <div class="exp-layout">
      <!-- Sidebar: Company list -->
      <div class="exp-sidebar">
        <div
          class="exp-tab"
          *ngFor="let exp of experiences; let i = index"
          [class.active]="activeExp === i"
          [style.--accent-color]="exp.color"
          (click)="setActive(i)">
          <div class="tab-indicator"></div>
          <div class="tab-content">
            <span class="tab-company">{{ exp.company }}</span>
            <span class="tab-period">{{ exp.period }}</span>
          </div>
          <div class="tab-badge" *ngIf="exp.type === 'current'">Actuel</div>
        </div>
      </div>

      <!-- Main: Experience detail -->
      <div class="exp-detail" *ngIf="experiences[activeExp] as exp">
        <div class="exp-detail-header">
          <div>
            <h3 class="exp-role">{{ exp.role }}</h3>
            <div class="exp-company-row">
              <span class="exp-company-name" [style.color]="exp.color">
                <i class="fas fa-building"></i>
                {{ exp.company }}
              </span>
              <span class="exp-period-badge">
                <i class="fas fa-calendar"></i>
                {{ exp.period }}
              </span>
            </div>
          </div>
        </div>

        <p class="exp-description">{{ exp.description }}</p>

        <div class="exp-tasks">
          <h4><i class="fas fa-tasks"></i> Responsabilités</h4>
          <ul>
            <li *ngFor="let task of exp.tasks">
              <span class="task-bullet" [style.background]="exp.color"></span>
              {{ task }}
            </li>
          </ul>
        </div>

        <div class="exp-tech">
          <h4><i class="fas fa-code"></i> Technologies</h4>
          <div class="tech-tags">
            <span class="tech-tag" *ngFor="let tech of exp.technologies"
              [style.border-color]="exp.color + '44'"
              [style.color]="exp.color">
              {{ tech }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
